name: Format Python

on:
  push:
    paths: &py_paths
      - "**/*.py"
      - "**/uv.lock"
      - "**/pyproject.toml"
      - "src/shared/py/**"
      - "src/graph/**"
      - ".github/workflows/lint-py.yaml"
  pull_request:
    paths: *py_paths

jobs:
  run-core-formatter:
    name: Lint (src/shared/py via uv)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/shared/py
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pipx install uv
      - name: Cache uv and venv
        uses: actions/cache@v4
        with:
          path: |
            src/shared/py/.cache/uv
            src/shared/py/.venv
          key: core-uv-venv-${{ runner.os }}-${{ hashFiles('src/shared/py/uv.lock', 'src/shared/py/pyproject.toml') }}
          restore-keys: core-uv-venv-${{ runner.os }}-
      - name: Sync dependencies (core)
        run: |
          if [ -f uv.lock ]; then
            uv sync --frozen
          else
            uv sync
          fi
      - name: Lint (core)
        run: |
          uv run ruff check . --fix
          uv run ruff format .
  run-root-formatter:
    name: Lint (root via uv)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.13"
          - "3.12"
          - "3.11"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pipx install uv
      - name: Cache uv and venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ./.venv
          key: root-uv-venv-${{ runner.os }}-${{ hashFiles('./uv.lock', './pyproject.toml') }}
          restore-keys: root-uv-venv-${{ runner.os }}-
      - name: Sync dependencies (root)
        run: |
          if [ -f uv.lock ]; then
            uv sync --frozen
          else
            uv sync
          fi
      - name: Lint (root)
        run: |
          uv run ruff check . --fix
          uv run ruff format .
  run-graph-formatter:
    name: Lint (src/graph via uv)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/graph
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pipx install uv
      - name: Cache uv and venv
        uses: actions/cache@v4
        with:
          path: |
            src/graph/.cache/uv
            src/graph/.venv
          key: graph-uv-venv-${{ runner.os }}-${{ hashFiles('src/graph/uv.lock', 'src/graph/pyproject.toml') }}
          restore-keys: graph-uv-venv-${{ runner.os }}-
      - name: Sync dependencies (graph)
        run: |
          if [ -f uv.lock ]; then
            uv sync --frozen
          else
            uv sync
          fi
      - name: Lint (graph)
        run: |
          uv run ruff check . --fix
          uv run ruff format .
